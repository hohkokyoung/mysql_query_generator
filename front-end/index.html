<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nl-sql agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e20;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8e6;
    --muted: #888884;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Title bar ── */
  .titlebar {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .title { font-size: 12px; color: var(--muted); margin-left: 8px; letter-spacing: 0.04em; }
  .badge {
    margin-left: auto;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 0.5px solid var(--border2);
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .badge.live { border-color: var(--green); color: var(--green); }

  /* ── Layout ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg2);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    border-bottom: 0.5px solid var(--border);
    padding: 12px 14px;
  }
  .section-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; margin-top: 8px; }
  label:first-of-type { margin-top: 0; }

  input, select {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 6px 9px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--border2); }
  select option { background: var(--bg3); }

  .btn {
    width: 100%;
    margin-top: 10px;
    padding: 7px 12px;
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: center;
  }
  .btn:hover { background: var(--bg3); border-color: rgba(255,255,255,0.22); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.primary { border-color: var(--cyan); color: var(--cyan); }
  .btn.primary:hover { background: rgba(34,211,238,0.08); }

  .schema-preview {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
    margin-top: 8px;
  }
  .schema-preview.empty { font-style: italic; }

  /* ── Agent panel ── */
  .agent-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-entry {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .log-tag {
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .log-body {
    font-size: 12px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .entry-user .log-tag { color: var(--blue); }
  .entry-user .log-body { color: var(--blue); }

  .entry-sql .log-body {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: 2px solid var(--cyan);
    border-radius: 5px;
    padding: 8px 12px;
    color: var(--cyan);
    font-family: var(--mono);
  }

  .entry-ok .log-tag { color: var(--green); }
  .entry-ok .log-body { color: var(--green); }

  .entry-err .log-tag { color: var(--red); }
  .entry-err .log-body { color: var(--red); }

  .entry-retry .log-tag { color: var(--yellow); }
  .entry-retry .log-body { color: var(--yellow); }

  .entry-info .log-body { color: var(--muted); }

  .entry-result .log-body {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 8px 12px;
    overflow-x: auto;
  }

  /* ── Result table ── */
  .result-table {
    border-collapse: collapse;
    font-size: 11px;
    width: 100%;
    min-width: max-content;
  }
  .result-table th {
    text-align: left;
    padding: 4px 12px 4px 0;
    color: var(--muted);
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
    font-weight: 500;
  }
  .result-table td {
    padding: 4px 12px 4px 0;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  .result-table tr:last-child td { border-bottom: none; }

  /* ── Input row ── */
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .prompt-sym { color: var(--cyan); font-size: 14px; flex-shrink: 0; }
  .nl-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }
  .nl-input::placeholder { color: var(--muted); }
  .run-btn {
    padding: 6px 14px;
    background: transparent;
    border: 0.5px solid var(--cyan);
    border-radius: 5px;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .run-btn:hover { background: rgba(34,211,238,0.1); }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Status bar ── */
  .statusbar {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .status-dot.active { background: var(--green); }
  .status-dot.error { background: var(--red); }
  .status-dot.warn { background: var(--yellow); }
  .status-text { font-size: 11px; color: var(--muted); }

  /* ── Divider in log ── */
  .log-divider {
    height: 0.5px;
    background: var(--border);
    margin: 4px 0;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="dots">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
  </div>
  <span class="title">nl-sql agent — mysql dry-run + ollama</span>
  <span class="badge" id="backendBadge">backend: checking...</span>
</div>

<div class="main">

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <div class="section">
      <div class="section-label">schema</div>
      <label>file path</label>
      <input id="schemaPath" placeholder="/path/to/schema.sql" />
      <button class="btn" onclick="loadSchema()">load schema</button>
      <div class="schema-preview empty" id="schemaPreview">no schema loaded</div>
    </div>

    <div class="section">
      <div class="section-label">mysql connection</div>
      <label>host</label>
      <input id="dbHost" value="127.0.0.1" />
      <label>port</label>
      <input id="dbPort" value="3306" />
      <label>database</label>
      <input id="dbName" placeholder="mydb" />
      <label>user</label>
      <input id="dbUser" value="root" />
      <label>password</label>
      <input id="dbPass" type="password" placeholder="••••••" />
      <button class="btn" onclick="testDB()">test connection</button>
    </div>

    <div class="section">
      <div class="section-label">ollama</div>
      <label>url</label>
      <input id="ollamaUrl" value="http://localhost:11434" />
      <label>model</label>
      <select id="ollamaModel">
        <option value="qwen2.5-coder:14b">qwen2.5-coder:14b</option>
        <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
        <option value="deepseek-coder-v2">deepseek-coder-v2</option>
        <option value="codellama:13b">codellama:13b</option>
        <option value="llama3.1:8b">llama3.1:8b</option>
      </select>
      <button class="btn" onclick="loadModels()">refresh models</button>
    </div>

    <div class="section">
      <div class="section-label">agent</div>
      <label>max retries</label>
      <select id="maxRetries">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="5">5</option>
      </select>
    </div>

  </div>

  <!-- ── Agent panel ── -->
  <div class="agent-panel">
    <div class="log-area" id="logArea">
      <div class="log-entry entry-info">
        <div class="log-body">ready. load your schema, configure mysql + ollama, then describe what you want.</div>
      </div>
    </div>

    <div class="input-row">
      <span class="prompt-sym">›</span>
      <input class="nl-input" id="nlInput" placeholder="show me all users who placed orders over $100 last month" />
      <button class="run-btn" id="runBtn" onclick="runAgent()">run</button>
    </div>

    <div class="statusbar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">idle</span>
    </div>
  </div>

</div>

<script>
const BACKEND = 'http://localhost:3333';
let schema = '';
let conversationHistory = [];

// ── Utilities ──────────────────────────────────────────────────────────────

function log(tag, body, type = 'info') {
  const area = document.getElementById('logArea');
  const entry = document.createElement('div');
  entry.className = `log-entry entry-${type}`;
  entry.innerHTML = `<div class="log-tag">${tag}</div><div class="log-body">${escHtml(body)}</div>`;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

function logHTML(tag, html, type = 'result') {
  const area = document.getElementById('logArea');
  const entry = document.createElement('div');
  entry.className = `log-entry entry-${type}`;
  entry.innerHTML = `<div class="log-tag">${tag}</div><div class="log-body">${html}</div>`;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

function logDivider() {
  const area = document.getElementById('logArea');
  const el = document.createElement('div');
  el.className = 'log-divider';
  area.appendChild(el);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(text, state = '') {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

async function api(path, body) {
  const res = await fetch(BACKEND + path, {
    method: body ? 'POST' : 'GET',
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

// ── Backend health check ───────────────────────────────────────────────────

async function checkBackend() {
  try {
    const res = await fetch(BACKEND + '/llm/models');
    if (res.ok) {
      document.getElementById('backendBadge').textContent = 'backend: connected';
      document.getElementById('backendBadge').classList.add('live');
    }
  } catch {
    document.getElementById('backendBadge').textContent = 'backend: offline — run npm start';
  }
}

// ── Schema ─────────────────────────────────────────────────────────────────

async function loadSchema() {
  const filePath = document.getElementById('schemaPath').value.trim();
  if (!filePath) return;
  setStatus('loading schema...', 'active');
  try {
    const data = await api('/schema', { filePath });
    if (data.error) { log('schema', data.error, 'err'); setStatus('error', 'error'); return; }
    schema = data.schema;
    const preview = document.getElementById('schemaPreview');
    preview.textContent = schema.slice(0, 800) + (schema.length > 800 ? '\n...' : '');
    preview.classList.remove('empty');
    log('schema', `loaded from ${data.path} (${schema.length} chars)`, 'ok');
    setStatus('schema loaded', 'active');
  } catch (err) {
    log('schema', 'cannot reach backend: ' + err.message, 'err');
    setStatus('error', 'error');
  }
  setTimeout(() => setStatus('idle'), 2000);
}

// ── DB test ────────────────────────────────────────────────────────────────

async function testDB() {
  setStatus('testing connection...', 'active');
  const data = await api('/db/test', dbConfig()).catch(e => ({ error: e.message }));
  if (data.error) { log('mysql', data.error, 'err'); setStatus('error', 'error'); }
  else { log('mysql', 'connection ok', 'ok'); setStatus('connected', 'active'); }
  setTimeout(() => setStatus('idle'), 2000);
}

function dbConfig() {
  return {
    host: document.getElementById('dbHost').value,
    port: parseInt(document.getElementById('dbPort').value) || 3306,
    user: document.getElementById('dbUser').value,
    password: document.getElementById('dbPass').value,
    database: document.getElementById('dbName').value
  };
}

// ── Models ────────────────────────────────────────────────────────────────

async function loadModels() {
  const url = document.getElementById('ollamaUrl').value;
  const data = await api(`/llm/models?url=${encodeURIComponent(url)}`).catch(() => ({ models: [] }));
  if (data.models && data.models.length) {
    const sel = document.getElementById('ollamaModel');
    sel.innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
    log('ollama', `found ${data.models.length} model(s): ${data.models.join(', ')}`, 'ok');
  } else {
    log('ollama', 'no models found or ollama unreachable', 'err');
  }
}

// ── LLM call ──────────────────────────────────────────────────────────────

async function callLLM(messages, system) {
  const data = await api('/llm', {
    model: document.getElementById('ollamaModel').value,
    ollamaUrl: document.getElementById('ollamaUrl').value,
    messages,
    system
  });
  if (data.error) throw new Error(data.error);
  return data.content;
}

function extractSQL(text) {
  const m = text.match(/```sql\s*([\s\S]*?)```/i) || text.match(/```\s*([\s\S]*?)```/);
  if (m) return m[1].trim();
  const lines = text.split('\n');
  const sqlLines = lines.filter(l => /^\s*(SELECT|INSERT|UPDATE|DELETE|WITH|CALL)/i.test(l.trim()));
  if (sqlLines.length) return text.trim();
  return null;
}

function renderTable(columns, rows) {
  if (!rows || !rows.length) return '<span style="color:var(--muted);font-size:11px">no rows returned</span>';
  const th = columns.map(c => `<th>${escHtml(c)}</th>`).join('');
  const trs = rows.map(r => `<tr>${columns.map(c => `<td>${escHtml(r[c] ?? 'NULL')}</td>`).join('')}</tr>`).join('');
  return `<table class="result-table"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
}

// ── Agent loop ─────────────────────────────────────────────────────────────

async function runAgent() {
  const nl = document.getElementById('nlInput').value.trim();
  if (!nl) return;
  if (!schema) { log('agent', 'load a schema first', 'err'); return; }

  const MAX_RETRIES = parseInt(document.getElementById('maxRetries').value);
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('nlInput').value = '';

  logDivider();
  log('you', nl, 'user');

  const systemPrompt = `You are a MySQL expert. You receive a database schema and a natural language request.
Output ONLY a single SQL query inside a \`\`\`sql code block — nothing else, no explanation, no preamble.
Use only tables and columns that exist in the provided schema.
If told the query had an error, output only the corrected SQL.
If told the result looks wrong, fix the logic and output only the corrected SQL.

Schema:
${schema}`;

  conversationHistory = [];
  let lastSQL = null;
  let lastError = null;
  let attempt = 0;

  while (attempt < MAX_RETRIES) {
    attempt++;
    setStatus(`generating sql (attempt ${attempt}/${MAX_RETRIES})...`, 'active');

    try {
      // ── Build message ──
      let userMsg;
      if (attempt === 1) {
        userMsg = `Natural language request: "${nl}"\nGenerate the MySQL query.`;
      } else if (lastError) {
        userMsg = `The previous SQL failed with this error:\n${lastError}\n\nPrevious SQL:\n\`\`\`sql\n${lastSQL}\n\`\`\`\n\nFix it. Output only the corrected SQL.`;
      } else {
        userMsg = `The query ran but the result may be incorrect for the request "${nl}".\nPrevious SQL:\n\`\`\`sql\n${lastSQL}\n\`\`\`\n\nReview and fix if needed. Output only the SQL.`;
      }

      conversationHistory.push({ role: 'user', content: userMsg });
      const reply = await callLLM(conversationHistory, systemPrompt);
      conversationHistory.push({ role: 'assistant', content: reply });

      const sql = extractSQL(reply);
      if (!sql) {
        lastError = 'could not extract sql from llm response';
        log('agent', lastError, 'err');
        continue;
      }

      lastSQL = sql;
      log(`sql (attempt ${attempt})`, sql, 'sql');

      // ── Dry-run ──
      setStatus('dry-running against mysql (begin/rollback)...', 'active');
      const dry = await api('/db/dryrun', { ...dbConfig(), sql });

      if (!dry.ok) {
        lastError = dry.error;
        log('dry-run', `failed: ${dry.error}`, 'err');
        if (attempt < MAX_RETRIES) log('agent', `rewriting... (${attempt}/${MAX_RETRIES})`, 'retry');
        continue;
      }

      log('dry-run', `passed — ${dry.rowCount} row(s) returned — transaction rolled back, nothing committed`, 'ok');
      logHTML('result', renderTable(dry.columns, dry.rows));

      // ── Self-verify ──
      setStatus('verifying result logic...', 'active');
      const verifyMsg = `The query ran successfully.
Returned ${dry.rowCount} rows with columns: ${dry.columns.join(', ')}.
Sample row: ${JSON.stringify(dry.rows[0] || {})}.

Does this correctly answer the original request: "${nl}"?
Reply with CORRECT or INCORRECT. If incorrect, explain the issue in one sentence.`;

      conversationHistory.push({ role: 'user', content: verifyMsg });
      const verdict = await callLLM(conversationHistory, systemPrompt);
      conversationHistory.push({ role: 'assistant', content: verdict });

      if (/^CORRECT/i.test(verdict.trim())) {
        log('verify', 'result looks correct', 'ok');
        setStatus('done', 'active');
        setTimeout(() => setStatus('idle'), 3000);
        break;
      } else {
        log('verify', verdict.trim(), 'retry');
        lastError = null;
        if (attempt < MAX_RETRIES) log('agent', `rewriting query...`, 'retry');
      }

    } catch (err) {
      log('error', err.message, 'err');
      setStatus('error', 'error');
      setTimeout(() => setStatus('idle'), 3000);
      break;
    }
  }

  if (attempt >= MAX_RETRIES) {
    log('agent', `reached max retries (${MAX_RETRIES}). last sql is your best attempt.`, 'err');
    setStatus('max retries reached', 'warn');
    setTimeout(() => setStatus('idle'), 4000);
  }

  btn.disabled = false;
}

document.getElementById('nlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('runBtn').disabled) runAgent();
});

checkBackend();
loadModels();
</script>
</body>
</html>
