<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nl-sql agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e20;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8e6;
    --muted: #888884;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .titlebar {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .title { font-size: 12px; color: var(--muted); margin-left: 8px; letter-spacing: 0.04em; }
  .badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 999px; border: 0.5px solid var(--border2); color: var(--muted); letter-spacing: 0.05em; }
  .badge.live { border-color: var(--green); color: var(--green); }

  .main { flex: 1; display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }

  .sidebar { background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }

  .section { border-bottom: 0.5px solid var(--border); padding: 12px 14px; }
  .section-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; margin-top: 8px; }
  label:first-of-type { margin-top: 0; }

  input, select {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 6px 9px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--border2); }
  select option { background: var(--bg3); }

  .btn {
    width: 100%; margin-top: 10px;
    padding: 7px 12px;
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
  }
  .btn:hover { background: var(--bg3); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.cyan { border-color: var(--cyan); color: var(--cyan); }
  .btn.cyan:hover { background: rgba(34,211,238,0.08); }

  /* schema source toggle */
  .toggle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .toggle-btn {
    padding: 5px 0;
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .toggle-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(34,211,238,0.07); }

  .schema-source { display: none; }
  .schema-source.visible { display: block; }

  .schema-preview {
    font-size: 11px; color: var(--muted);
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: 5px; padding: 8px 10px;
    max-height: 120px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
    line-height: 1.5; margin-top: 8px;
  }
  .schema-preview.empty { font-style: italic; }

  /* table pills */
  .table-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .table-pill {
    font-size: 10px; padding: 2px 7px;
    border: 0.5px solid var(--border); border-radius: 999px;
    color: var(--muted);
  }

  .agent-panel { display: flex; flex-direction: column; overflow: hidden; }

  .log-area {
    flex: 1; overflow-y: auto;
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .log-entry { display: flex; flex-direction: column; gap: 2px; }
  .log-tag { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .log-body { font-size: 12px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }

  .entry-user .log-tag { color: var(--blue); }
  .entry-user .log-body { color: var(--blue); }
  .entry-sql .log-body {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-left: 2px solid var(--cyan); border-radius: 5px;
    padding: 8px 12px; color: var(--cyan); font-family: var(--mono);
  }
  .entry-ok .log-tag { color: var(--green); }
  .entry-ok .log-body { color: var(--green); }
  .entry-err .log-tag { color: var(--red); }
  .entry-err .log-body { color: var(--red); }
  .entry-retry .log-tag { color: var(--yellow); }
  .entry-retry .log-body { color: var(--yellow); }
  .entry-info .log-body { color: var(--muted); }
  .entry-result .log-body {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 5px; padding: 8px 12px; overflow-x: auto;
  }

  .result-table { border-collapse: collapse; font-size: 11px; width: 100%; min-width: max-content; }
  .result-table th { text-align: left; padding: 4px 12px 4px 0; color: var(--muted); border-bottom: 0.5px solid var(--border); white-space: nowrap; font-weight: 500; }
  .result-table td { padding: 4px 12px 4px 0; border-bottom: 0.5px solid var(--border); color: var(--text); white-space: nowrap; }
  .result-table tr:last-child td { border-bottom: none; }

  .input-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  .prompt-sym { color: var(--cyan); font-size: 14px; flex-shrink: 0; }
  .nl-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--mono); font-size: 13px; color: var(--text);
  }
  .nl-input::placeholder { color: var(--muted); }
  .run-btn {
    padding: 6px 14px; background: transparent;
    border: 0.5px solid var(--cyan); border-radius: 5px;
    color: var(--cyan); font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: background 0.15s; flex-shrink: 0;
  }
  .run-btn:hover { background: rgba(34,211,238,0.1); }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .statusbar {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 18px; border-top: 0.5px solid var(--border);
    background: var(--bg); flex-shrink: 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.2s; }
  .status-dot.active { background: var(--green); }
  .status-dot.error  { background: var(--red); }
  .status-dot.warn   { background: var(--yellow); }
  .status-text { font-size: 11px; color: var(--muted); }

  .log-divider { height: 0.5px; background: var(--border); margin: 4px 0; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="dots">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
  </div>
  <span class="title">nl-sql agent — mysql dry-run + ollama</span>
  <span class="badge" id="backendBadge">backend: checking...</span>
</div>

<div class="main">

  <div class="sidebar">

    <!-- ── Schema section ── -->
    <div class="section">
      <div class="section-label">schema</div>

      <div class="toggle-row">
        <button class="toggle-btn active" id="btnSrcDb"   onclick="setSchemaSource('db')">from connection</button>
        <button class="toggle-btn"        id="btnSrcFile" onclick="setSchemaSource('file')">from file</button>
      </div>

      <!-- db source -->
      <div class="schema-source visible" id="srcDb">
        <label>database name</label>
        <input id="dbNameInput" list="dbNameList" placeholder="type or connect to pick" />
        <datalist id="dbNameList"></datalist>
        <button class="btn cyan" onclick="loadSchemaFromDB()">read schema from db</button>
      </div>

      <!-- file source -->
      <div class="schema-source" id="srcFile">
        <label>file path</label>
        <input id="schemaPath" placeholder="C:\path\to\schema.sql" />
        <button class="btn" onclick="loadSchemaFromFile()">load schema file</button>
      </div>

      <div class="schema-preview empty" id="schemaPreview">no schema loaded</div>
      <div class="table-pills" id="tablePills"></div>
    </div>

    <!-- ── MySQL connection ── -->
    <div class="section">
      <div class="section-label">mysql connection</div>
      <label>host</label>
      <input id="dbHost" value="127.0.0.1" />
      <label>port</label>
      <input id="dbPort" value="3306" />
      <label>user</label>
      <input id="dbUser" value="root" />
      <label>password</label>
      <input id="dbPass" type="password" placeholder="••••••" />
      <button class="btn" onclick="testDB()">test connection</button>
    </div>

    <!-- ── Ollama ── -->
    <div class="section">
      <div class="section-label">ollama</div>
      <label>url</label>
      <input id="ollamaUrl" value="http://127.0.0.1:11434" />
      <label>model</label>
      <select id="ollamaModel">
        <option value="qwen2.5-coder:14b">qwen2.5-coder:14b</option>
        <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
        <option value="deepseek-coder-v2">deepseek-coder-v2</option>
        <option value="codellama:13b">codellama:13b</option>
        <option value="llama3.1:8b">llama3.1:8b</option>
      </select>
      <button class="btn" onclick="loadModels()">refresh models</button>
    </div>

    <!-- ── Agent settings ── -->
    <div class="section">
      <div class="section-label">agent</div>
      <label>max retries</label>
      <select id="maxRetries">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="5">5</option>
      </select>
    </div>

  </div>

  <!-- ── Agent panel ── -->
  <div class="agent-panel">
    <div class="log-area" id="logArea">
      <div class="log-entry entry-info">
        <div class="log-body">ready. test your mysql connection, then click "read schema from db" to auto-load your schema.</div>
      </div>
    </div>

    <div class="input-row">
      <span class="prompt-sym">›</span>
      <input class="nl-input" id="nlInput" placeholder="show me all customers who spent over $1000" />
      <button class="run-btn" id="runBtn" onclick="runAgent()">run</button>
    </div>

    <div class="statusbar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">idle</span>
    </div>
  </div>

</div>

<script>
const BACKEND = 'http://localhost:3333';
let schema = '';
let conversationHistory = [];
let schemaSource = 'db';

// ── Utilities ──────────────────────────────────────────────────────────────

function log(tag, body, type = 'info') {
  const area = document.getElementById('logArea');
  const entry = document.createElement('div');
  entry.className = `log-entry entry-${type}`;
  entry.innerHTML = `<div class="log-tag">${tag}</div><div class="log-body">${escHtml(body)}</div>`;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

function logHTML(tag, html, type = 'result') {
  const area = document.getElementById('logArea');
  const entry = document.createElement('div');
  entry.className = `log-entry entry-${type}`;
  entry.innerHTML = `<div class="log-tag">${tag}</div><div class="log-body">${html}</div>`;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

function logDivider() {
  const area = document.getElementById('logArea');
  const el = document.createElement('div');
  el.className = 'log-divider';
  area.appendChild(el);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(text, state = '') {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'status-dot' + (state ? ' ' + state : '');
}

async function api(path, body) {
  const res = await fetch(BACKEND + path, {
    method: body !== undefined ? 'POST' : 'GET',
    headers: body !== undefined ? { 'Content-Type': 'application/json' } : {},
    body: body !== undefined ? JSON.stringify(body) : undefined
  });
  return res.json();
}

function dbConfig() {
  return {
    host:     document.getElementById('dbHost').value,
    port:     document.getElementById('dbPort').value,
    user:     document.getElementById('dbUser').value,
    password: document.getElementById('dbPass').value,
    database: document.getElementById('dbNameInput').value.trim()
  };
}

// ── Schema source toggle ───────────────────────────────────────────────────

function setSchemaSource(src) {
  schemaSource = src;
  document.getElementById('btnSrcDb').classList.toggle('active', src === 'db');
  document.getElementById('btnSrcFile').classList.toggle('active', src === 'file');
  document.getElementById('srcDb').classList.toggle('visible', src === 'db');
  document.getElementById('srcFile').classList.toggle('visible', src === 'file');
}

function applySchema(data) {
  schema = data.schema;
  const preview = document.getElementById('schemaPreview');
  preview.textContent = schema.slice(0, 600) + (schema.length > 600 ? '\n...' : '');
  preview.classList.remove('empty');

  const pills = document.getElementById('tablePills');
  if (data.tables && data.tables.length) {
    pills.innerHTML = data.tables.map(t => `<span class="table-pill">${t}</span>`).join('');
  } else {
    pills.innerHTML = '';
  }
}

// ── Load schema from DB ────────────────────────────────────────────────────

async function loadSchemaFromDB() {
  const db = document.getElementById('dbNameInput').value.trim();
  if (!db) { log('schema', 'enter a database name first', 'err'); return; }
  setStatus('reading schema from db...', 'active');
  try {
    const data = await api('/schema/db', dbConfig());
    if (data.error) { log('schema', data.error, 'err'); setStatus('error', 'error'); return; }
    applySchema(data);
    log('schema', `loaded ${data.tableCount} tables from "${db}" via live connection`, 'ok');
    setStatus('schema loaded', 'active');
  } catch (err) {
    log('schema', 'backend error: ' + err.message, 'err');
    setStatus('error', 'error');
  }
  setTimeout(() => setStatus('idle'), 2000);
}

// ── Load schema from file ──────────────────────────────────────────────────

async function loadSchemaFromFile() {
  const filePath = document.getElementById('schemaPath').value.trim();
  if (!filePath) return;
  setStatus('loading schema file...', 'active');
  try {
    const data = await api('/schema/file', { filePath });
    if (data.error) { log('schema', data.error, 'err'); setStatus('error', 'error'); return; }
    applySchema({ ...data, tables: [] });
    log('schema', `loaded from ${data.path} (${schema.length} chars)`, 'ok');
    setStatus('schema loaded', 'active');
  } catch (err) {
    log('schema', 'backend error: ' + err.message, 'err');
    setStatus('error', 'error');
  }
  setTimeout(() => setStatus('idle'), 2000);
}

// ── DB test ────────────────────────────────────────────────────────────────

async function testDB() {
  setStatus('testing connection...', 'active');
  try {
    const payload = {
      host: document.getElementById('dbHost').value,
      port: document.getElementById('dbPort').value,
      user: document.getElementById('dbUser').value,
      password: document.getElementById('dbPass').value
    };
    log('mysql', `trying ${payload.user}@${payload.host}:${payload.port}...`, 'info');

    const res = await fetch(BACKEND + '/db/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    log('mysql', `backend replied: ${JSON.stringify(data)}`, 'info');

    if (data.error || !data.databases) {
      log('mysql', data.error || 'unexpected response — no databases field', 'err');
      setStatus('error', 'error');
    } else {
      log('mysql', `connected — databases: ${data.databases.join(', ')}`, 'ok');

      // populate datalist for autocomplete
      const dl = document.getElementById('dbNameList');
      dl.innerHTML = data.databases.map(d => `<option value="${d}">`).join('');

      // auto-fill if only one user database exists
      if (data.databases.length === 1) {
        document.getElementById('dbNameInput').value = data.databases[0];
      }

      setStatus('connected', 'active');
    }
  } catch (err) {
    log('mysql', 'cannot reach backend: ' + err.message, 'err');
    setStatus('error', 'error');
  }
  setTimeout(() => setStatus('idle'), 2000);
}

// ── Ollama models ──────────────────────────────────────────────────────────

async function loadModels() {
  const url = document.getElementById('ollamaUrl').value;
  try {
    const data = await api(`/llm/models?url=${encodeURIComponent(url)}`);
    if (data.models && data.models.length) {
      const sel = document.getElementById('ollamaModel');
      sel.innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
      log('ollama', `${data.models.length} model(s): ${data.models.join(', ')}`, 'ok');
    } else {
      log('ollama', 'no models found — run: ollama pull qwen2.5-coder:7b', 'err');
    }
  } catch {
    log('ollama', 'cannot reach backend', 'err');
  }
}

// ── LLM ───────────────────────────────────────────────────────────────────

async function callLLM(messages, system) {
  const data = await api('/llm', {
    model: document.getElementById('ollamaModel').value,
    ollamaUrl: document.getElementById('ollamaUrl').value,
    messages,
    system
  });
  if (data.error) throw new Error(data.error);
  return data.content;
}

function extractSQL(text) {
  const m = text.match(/```sql\s*([\s\S]*?)```/i) || text.match(/```\s*([\s\S]*?)```/);
  if (m) return m[1].trim();
  if (/^\s*(SELECT|WITH|CALL)/i.test(text.trim())) return text.trim();
  return null;
}

function renderTable(columns, rows) {
  if (!rows || !rows.length) return '<span style="color:var(--muted);font-size:11px">no rows returned</span>';
  const th = columns.map(c => `<th>${escHtml(c)}</th>`).join('');
  const trs = rows.map(r => `<tr>${columns.map(c => `<td>${escHtml(r[c] ?? 'NULL')}</td>`).join('')}</tr>`).join('');
  return `<table class="result-table"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
}

// ── Agent loop ─────────────────────────────────────────────────────────────

async function runAgent() {
  const nl = document.getElementById('nlInput').value.trim();
  if (!nl) return;
  if (!schema) { log('agent', 'load a schema first', 'err'); return; }

  const MAX_RETRIES = parseInt(document.getElementById('maxRetries').value);
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('nlInput').value = '';

  logDivider();
  log('you', nl, 'user');

  const systemPrompt = `You are a MySQL expert. Output ONLY a single SQL query inside a \`\`\`sql code block — nothing else, no explanation, no preamble.
Use only tables and columns from the schema provided in the user message.
If told the query had an error, output only the corrected SQL.
If told the result looks wrong, fix the logic and output only the corrected SQL.`;

  conversationHistory = [];
  let lastSQL = null;
  let lastError = null;
  let attempt = 0;

  while (attempt < MAX_RETRIES) {
    attempt++;
    setStatus(`generating sql (attempt ${attempt}/${MAX_RETRIES})...`, 'active');

    try {
      let userMsg;
      if (attempt === 1) {
        // always embed full schema in first message — local models ignore system prompts
        userMsg = `Database schema:\n\`\`\`sql\n${schema}\n\`\`\`\n\nNatural language request: "${nl}"\n\nGenerate the MySQL query.`;
      } else if (lastError) {
        userMsg = `The previous SQL failed with this error:\n${lastError}\n\nPrevious SQL:\n\`\`\`sql\n${lastSQL}\n\`\`\`\n\nRemember the schema above. Fix the SQL. Output only the corrected query.`;
      } else {
        userMsg = `The query ran but may be incorrect for: "${nl}".\nPrevious SQL:\n\`\`\`sql\n${lastSQL}\n\`\`\`\n\nRemember the schema above. Fix the logic. Output only the corrected SQL.`;
      }

      conversationHistory.push({ role: 'user', content: userMsg });
      const reply = await callLLM(conversationHistory, systemPrompt);
      conversationHistory.push({ role: 'assistant', content: reply });

      const sql = extractSQL(reply);
      if (!sql) {
        lastError = 'could not extract sql from model response';
        log('agent', lastError, 'err');
        continue;
      }

      lastSQL = sql;
      log(`sql (attempt ${attempt})`, sql, 'sql');

      // dry-run
      setStatus('dry-running (begin/rollback)...', 'active');
      const dry = await api('/db/dryrun', { ...dbConfig(), sql });

      if (!dry.ok) {
        lastError = dry.error;
        log('dry-run', `failed: ${dry.error}`, 'err');
        if (attempt < MAX_RETRIES) log('agent', `rewriting... (${attempt}/${MAX_RETRIES})`, 'retry');
        continue;
      }

      log('dry-run', `passed — ${dry.rowCount} row(s) — transaction rolled back, nothing committed`, 'ok');
      logHTML('result', renderTable(dry.columns, dry.rows));

      // self-verify
      setStatus('verifying result...', 'active');
      const verifyMsg = `Query ran. ${dry.rowCount} rows, columns: ${dry.columns.join(', ')}.
Sample: ${JSON.stringify(dry.rows[0] || {})}.
Does this correctly answer: "${nl}"?
Reply CORRECT or INCORRECT. If incorrect, one sentence why.`;

      conversationHistory.push({ role: 'user', content: verifyMsg });
      const verdict = await callLLM(conversationHistory, systemPrompt);
      conversationHistory.push({ role: 'assistant', content: verdict });

      if (/^CORRECT/i.test(verdict.trim())) {
        log('verify', 'result looks correct', 'ok');
        setStatus('done', 'active');
        setTimeout(() => setStatus('idle'), 3000);
        break;
      } else {
        log('verify', verdict.trim(), 'retry');
        lastError = null;
        if (attempt < MAX_RETRIES) log('agent', 'rewriting query...', 'retry');
      }

    } catch (err) {
      log('error', err.message, 'err');
      setStatus('error', 'error');
      setTimeout(() => setStatus('idle'), 3000);
      break;
    }
  }

  if (attempt >= MAX_RETRIES) {
    log('agent', `max retries (${MAX_RETRIES}) reached. last sql is your best attempt.`, 'err');
    setStatus('max retries', 'warn');
    setTimeout(() => setStatus('idle'), 4000);
  }

  btn.disabled = false;
}

document.getElementById('nlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('runBtn').disabled) runAgent();
});

async function checkBackend() {
  try {
    const res = await fetch(BACKEND + '/llm/models');
    if (res.ok) {
      document.getElementById('backendBadge').textContent = 'backend: connected';
      document.getElementById('backendBadge').classList.add('live');
    }
  } catch {
    document.getElementById('backendBadge').textContent = 'backend: offline — run npm start';
  }
}

checkBackend();
loadModels();
